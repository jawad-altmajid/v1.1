<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIS - Group Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            padding: 60px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-box h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .login-box p {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: 2px solid #667eea;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            display: none;
            color: #e74c3c;
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .container {
            display: flex;
            gap: 80px;
            align-items: flex-start;
            background: white;
            padding: 60px 80px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100vh;
            overflow-y: auto;
            display: none;
        }

        .container.show {
            display: flex;
        }

        .chat-full-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2000;
        }

        .chat-full-screen.show {
            display: flex;
        }

        .chat-header {
            background: #0d5a47;
            color: white;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .chat-header h1 {
            font-size: 36px;
            margin: 0;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
        }

        .chat-messages-container {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 30px;
            overflow-y: auto;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .chat-message {
            padding: 15px;
            margin: 15px 0;
            background: #ecf0f1;
            border-radius: 10px;
            border-left: 5px solid #1abc9c;
            animation: slideInMsg 0.3s ease;
        }

        @keyframes slideInMsg {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-message.own {
            background: #d5f4e6;
            border-left: 5px solid #16a085;
            margin-left: 40px;
        }

        .chat-message-user {
            font-weight: bold;
            color: #1abc9c;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .chat-message.own .chat-message-user {
            color: #16a085;
        }

        .chat-message-text {
            color: #333;
            font-size: 16px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .chat-input-section {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .chat-input {
            flex: 1;
            padding: 18px;
            font-size: 16px;
            border: 2px solid #1abc9c;
            border-radius: 8px;
            transition: all 0.3s ease;
            resize: none;
            max-height: 80px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #16a085;
            box-shadow: 0 0 10px rgba(26, 188, 156, 0.3);
        }

        .send-btn {
            padding: 18px 40px;
            font-size: 16px;
            background: #1abc9c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #16a085;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.4);
        }

        .back-to-main-btn {
            padding: 15px 30px;
            font-size: 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .back-to-main-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .auth-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .sign-in-btn, .sign-up-btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .sign-in-btn {
            background: #2ecc71;
            color: white;
        }

        .sign-in-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .sign-up-btn {
            background: #3498db;
            color: white;
        }

        .sign-up-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 180px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin-bottom: 80px;
            letter-spacing: 5px;
            line-height: 1;
        }

        .button-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        button {
            padding: 25px 70px;
            font-size: 26px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .members-btn {
            background: #667eea;
            color: white;
        }

        .members-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .video-btn {
            background: #ff6b6b;
            color: white;
        }

        .video-btn:hover {
            background: #ee5a52;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .achievements-btn {
            background: #f39c12;
            color: white;
        }

        .achievements-btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .music-btn {
            background: #ff69b4;
            color: white;
        }

        .music-btn:hover {
            background: #ff1493;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }

        .chat-btn {
            background: #1abc9c;
            color: white;
        }

        .chat-btn:hover {
            background: #16a085;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 188, 156, 0.4);
        }

        .back-btn {
            background: #95a5a6;
            color: white;
        }

        .back-btn:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .members-list {
            display: none;
            background: #f8f9fa;
            padding: 50px;
            border-radius: 8px;
            animation: slideInAnim 0.3s ease;
        }

        .members-list.show {
            display: block;
        }

        @keyframes slideInAnim {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .members-list h2 {
            margin-bottom: 40px;
            color: #333;
            font-size: 36px;
        }

        .members-list ul {
            list-style: none;
        }

        .members-list li {
            padding: 25px;
            margin: 18px 0;
            background: white;
            border-left: 6px solid #667eea;
            border-radius: 4px;
            font-size: 32px;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .members-list li:hover {
            background: #667eea;
            color: white;
            transform: translateX(15px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .members-list li.secret:hover {
            background: #000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
        }

        .members-list li.ceo:hover {
            background: #9b59b6;
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.4);
        }

        .role-badge {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .members-list li:hover .role-badge {
            background: #fff;
            color: #667eea;
        }

        .members-list li.secret:hover .role-badge {
            background: #ffd700;
            color: #000;
        }

        .members-list li.ceo:hover .role-badge {
            background: #fff;
            color: #9b59b6;
        }

        .member-detail {
            display: none;
            background: #e8f0fe;
            padding: 50px;
            border-radius: 8px;
            border: 3px solid #667eea;
            animation: slideInAnim 0.3s ease;
        }

        .member-detail.show {
            display: block;
        }

        .member-detail.secret-detail {
            background: #1a1a1a;
            border: 3px solid #ffd700;
        }

        .member-detail.secret-detail h3 {
            color: #ffd700;
        }

        .member-detail.secret-detail .member-role {
            color: #ffd700;
        }

        .member-detail.secret-detail p {
            color: #fff;
        }

        .member-detail.ceo-detail {
            background: #f4ecf7;
            border: 3px solid #9b59b6;
        }

        .member-detail.ceo-detail h3 {
            color: #9b59b6;
        }

        .member-detail.ceo-detail .member-role {
            color: #9b59b6;
        }

        .member-detail h3 {
            color: #667eea;
            font-size: 50px;
            margin-bottom: 15px;
        }

        .member-role {
            color: #ff6b6b;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .member-detail p {
            color: #333;
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .member-detail.secret-detail p {
            color: #fff;
        }

        .achievements-section {
            display: none;
            background: #fff8dc;
            padding: 50px;
            border-radius: 8px;
            border: 3px solid #f39c12;
            animation: slideInAnim 0.3s ease;
        }

        .achievements-section.show {
            display: block;
        }

        .achievements-section h2 {
            color: #f39c12;
            font-size: 40px;
            margin-bottom: 30px;
        }

        .achievements-section ul {
            list-style: none;
        }

        .achievements-section li {
            padding: 20px;
            margin: 15px 0;
            background: white;
            border-left: 6px solid #f39c12;
            border-radius: 4px;
            font-size: 28px;
            color: #333;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            animation: slideUp 0.3s ease;
        }

        .modal-content h2 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .submit-btn {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #667eea;
            color: white;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .close-btn {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #95a5a6;
            color: white;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #7f8c8d;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
                gap: 40px;
                padding: 40px;
            }

            h1 {
                font-size: 100px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            h1 {
                font-size: 60px;
            }

            .members-list li {
                flex-direction: column;
                align-items: flex-start;
            }

            .role-badge {
                margin-top: 10px;
            }

            button {
                padding: 15px 40px;
                font-size: 18px;
            }

            .chat-messages-container {
                padding: 15px;
            }

            .chat-input-section {
                flex-direction: column;
            }

            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>JIS</h1>
            <p>Welcome to JIS Group</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input type="text" id="nameInput" placeholder="Enter your name" required>
                </div>
                <button type="submit" class="login-btn">Enter</button>
            </form>
            <div class="error-message" id="errorMessage">Try Again</div>
        </div>
    </div>

    <!-- Main Website -->
    <div class="container" id="mainContainer">
        <!-- Main Content -->
        <div class="content">
            <div class="auth-buttons">
                <button class="sign-in-btn" onclick="openSignIn()">Sign In</button>
                <button class="sign-up-btn" onclick="openSignUp()">Sign Up</button>
            </div>

            <h1>JIS</h1>

            <div class="button-container">
                <button class="members-btn" onclick="toggleMembers()">Click Members</button>
                <button class="video-btn" onclick="playVideo()">Video</button>
                <button class="achievements-btn" onclick="showAchievements()">Achievements</button>
                <button class="music-btn" onclick="playMusic()">🎵 Manly Music</button>
                <button class="chat-btn" onclick="openFullScreenChat()">💬 Chat</button>
            </div>

            <!-- Members List -->
            <div class="members-list" id="membersList">
                <h2>Our Members:</h2>
                <ul>
                    <li onclick="showMember('Jawad', 'Owner', 'Jawad is the Owner and leader of our group! He guides us with vision and dedication.', false, false)">
                        <span>Jawad</span>
                        <span class="role-badge">👑 Owner</span>
                    </li>
                    <li onclick="showMember('Izaan', 'Chairman', 'Izaan is our Chairman! He brings strategic thinking and manages our group with excellence.', false, false)">
                        <span>Izaan</span>
                        <span class="role-badge">⭐ Chairman</span>
                    </li>
                    <li class="ceo" onclick="showMember('Yafir', 'CEO', 'Yafir is our CEO! He leads with innovation and takes the group to new heights! 🚀', false, true)">
                        <span>Yafir</span>
                        <span class="role-badge">💼 CEO</span>
                    </li>
                    <li class="secret" onclick="showMember('Ibtisam', 'Secret Diddy 🤫', '🚨 CLASSIFIED 🚨\n\nIbtisam is the SECRET DIDDY! The most mysterious member of the group! This is a classified operation - DO NOT SHARE! 🤐💎', true, false)">
                        <span>Ibtisam</span>
                        <span class="role-badge">🤫 Secret Diddy</span>
                    </li>
                </ul>

                <!-- Member Detail -->
                <div class="member-detail" id="memberDetail">
                    <h3 id="memberName"></h3>
                    <p id="memberBio"></p>
                    <div class="member-role" id="memberRoleDisplay"></div>
                    <button class="back-btn" onclick="hideMember()">Back</button>
                </div>

                <button class="back-btn" id="backBtn" onclick="toggleMembers()" style="margin-top: 40px;">Back</button>
            </div>

            <!-- Achievements Section -->
            <div class="achievements-section" id="achievementsSection">
                <h2>🏆 JIS Achievements 🏆</h2>
                <ul>
                    <li>⭐ Better than YTN</li>
                    <li>😇 Good Boys</li>
                </ul>
                <button class="back-btn" onclick="hideAchievements()" style="margin-top: 40px;">Back</button>
            </div>
        </div>
    </div>

    <!-- Full Screen Chat -->
    <div class="chat-full-screen" id="chatFullScreen">
        <div class="chat-header">
            <h1>💬 JIS Group Chat</h1>
            <p id="chatUserDisplay" style="margin: 10px 0 0 0; font-size: 18px;">User: </p>
            <button class="back-to-main-btn" onclick="closeFullScreenChat()">Back to Main</button>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages-container" id="chatMessagesContainer"></div>
            
            <div class="chat-input-section">
                <textarea class="chat-input" id="chatInputArea" placeholder="Type your message..." rows="2"></textarea>
                <button class="send-btn" onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- Sign In Modal -->
    <div class="modal" id="signInModal">
        <div class="modal-content">
            <h2>Sign In</h2>
            <form onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label for="signin-email">Email:</label>
                    <input type="email" id="signin-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="signin-password">Password:</label>
                    <input type="password" id="signin-password" name="password" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="submit-btn">Sign In</button>
                    <button type="button" class="close-btn" onclick="closeSignIn()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div class="modal" id="signUpModal">
        <div class="modal-content">
            <h2>Sign Up</h2>
            <form onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label for="signup-name">Full Name:</label>
                    <input type="text" id="signup-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email:</label>
                    <input type="email" id="signup-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password:</label>
                    <input type="password" id="signup-password" name="password" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="submit-btn">Sign Up</button>
                    <button type="button" class="close-btn" onclick="closeSignUp()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const validMembers = ['Jawad', 'Izaan', 'Ibtisam', 'Yafir'];
        const memberColors = {
            'Jawad': '#667eea',
            'Izaan': '#3498db',
            'Ibtisam': '#ffd700',
            'Yafir': '#9b59b6'
        };

        let currentUser = '';

        function handleLogin(event) {
            event.preventDefault();
            const name = document.getElementById('nameInput').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            if (validMembers.some(member => member.toLowerCase() === name.toLowerCase())) {
                currentUser = name;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainContainer').classList.add('show');
                loadChats();
            } else {
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        }

        function loadChats() {
            const chatMessagesContainer = document.getElementById('chatMessagesContainer');
            const savedChats = JSON.parse(localStorage.getItem('groupChats')) || [];
            chatMessagesContainer.innerHTML = '';
            savedChats.forEach(chat => {
                displayChatMessage(chat.user, chat.message, chat.user === currentUser);
            });
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        }

        function displayChatMessage(user, message, isOwn) {
            const chatMessagesContainer = document.getElementById('chatMessagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isOwn ? 'own' : ''}`;
            
            const userColor = memberColors[user] || '#1abc9c';
            messageDiv.innerHTML = `
                <div class="chat-message-user" style="color: ${userColor}">${user}</div>
                <div class="chat-message-text">${message}</div>
            `;
            chatMessagesContainer.appendChild(messageDiv);
            chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
        }

        function toggleMembers() {
            const membersList = document.getElementById('membersList');
            const achievementsSection = document.getElementById('achievementsSection');
            membersList.classList.toggle('show');
            achievementsSection.classList.remove('show');
        }

        function playVideo() {
            window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        }

        function playMusic() {
            window.location.href = 'https://www.youtube.com/watch?v=nQVaRFP-ppw';
        }

        function showMember(name, role, bio, isSecret, isCEO) {
            const memberDetail = document.getElementById('memberDetail');
            const achievementsSection = document.getElementById('achievementsSection');
            document.getElementById('memberName').textContent = name;
            document.getElementById('memberRoleDisplay').textContent = role;
            document.getElementById('memberBio').textContent = bio;
            
            memberDetail.classList.remove('secret-detail', 'ceo-detail');
            
            if (isSecret) {
                memberDetail.classList.add('secret-detail');
            } else if (isCEO) {
                memberDetail.classList.add('ceo-detail');
            }
            
            memberDetail.classList.add('show');
            achievementsSection.classList.remove('show');
            document.getElementById('backBtn').style.display = 'none';
        }

        function hideMember() {
            document.getElementById('memberDetail').classList.remove('show');
            document.getElementById('backBtn').style.display = 'block';
        }

        function showAchievements() {
            const membersList = document.getElementById('membersList');
            const achievementsSection = document.getElementById('achievementsSection');
            membersList.classList.remove('show');
            achievementsSection.classList.add('show');
        }

        function hideAchievements() {
            document.getElementById('achievementsSection').classList.remove('show');
        }

        function openFullScreenChat() {
            document.getElementById('chatFullScreen').classList.add('show');
            document.getElementById('chatUserDisplay').textContent = `User: ${currentUser}`;
            loadChats();
            document.getElementById('chatInputArea').focus();
        }

        function closeFullScreenChat() {
            document.getElementById('chatFullScreen').classList.remove('show');
        }

        function sendChatMessage() {
            const chatInputArea = document.getElementById('chatInputArea');
            const message = chatInputArea.value.trim();

            if (message === '') return;

            const savedChats = JSON.parse(localStorage.getItem('groupChats')) || [];
            savedChats.push({
                user: currentUser,
                message: message
            });
            localStorage.setItem('groupChats', JSON.stringify(savedChats));

            displayChatMessage(currentUser, message, true);
            chatInputArea.value = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            const chatInputArea = document.getElementById('chatInputArea');
            if (chatInputArea) {
                chatInputArea.addEventListener('keypress', function(event) {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        sendChatMessage();
                    }
                });
            }
        });

        function openSignIn() {
            document.getElementById('signInModal').classList.add('show');
        }

        function closeSignIn() {
            document.getElementById('signInModal').classList.remove('show');
        }

        function openSignUp() {
            document.getElementById('signUpModal').classList.add('show');
        }

        function closeSignUp() {
            document.getElementById('signUpModal').classList.remove('show');
        }

        function handleSignIn(event) {
            event.preventDefault();
            const email = document.getElementById('signin-email').value;
            alert('Signed in as: ' + email);
            closeSignIn();
        }

        function handleSignUp(event) {
            event.preventDefault();
            const name = document.getElementById('signup-name').value;
            alert('Account created for: ' + name);
            closeSignUp();
        }

        window.onclick = function(event) {
            const signInModal = document.getElementById('signInModal');
            const signUpModal = document.getElementById('signUpModal');
            if (event.target == signInModal) {
                signInModal.classList.remove('show');
            }
            if (event.target == signUpModal) {
                signUpModal.classList.remove('show');
            }
        }
    </script>
</body>
</html>
